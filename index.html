<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Trade Tape Reader - Delta Chart</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
background: #131722;
color: #d1d4dc;
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
padding: 10px;
font-size: 12px;
line-height: 1.4;
display: flex;
flex-direction: column;
min-height: 100vh;
}
/* === HEADER === */
.header {
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 8px;
margin-bottom: 8px;
flex-shrink: 0;
}
.header h1 {
font-size: 14px;
font-weight: 600;
color: #2962ff;
margin: 0;
}
.header-btns {
display: flex;
gap: 6px;
flex-wrap: wrap;
}
.btn {
padding: 4px 10px;
background: #2a2e39;
color: #787b86;
border: 1px solid #434651;
border-radius: 3px;
cursor: pointer;
font-size: 11px;
transition: background 0.15s;
}
.btn:hover { background: #363a45; color: #d1d4dc; }
.btn.active { background: #2962ff; color: #fff; border-color: #1e53e5; }
.btn-primary { background: #2962ff; color: #fff; border-color: #1e53e5; }
.btn-danger { background: #f23645; color: #fff; border-color: #e04848; }
/* === CONTROL PANEL === */
#controlPanelWrapper {
margin-bottom: 8px;
overflow: hidden;
transition: max-height 0.2s;
max-height: 150px;
flex-shrink: 0;
}
#controlPanelWrapper.collapsed { max-height: 0; }
#controlPanel {
background: #1e222d;
padding: 6px 8px;
border-radius: 4px;
display: flex;
flex-wrap: wrap;
gap: 6px 8px;
align-items: center;
border: 1px solid #363a45;
}
#controlPanel label {
color: #787b86;
font-size: 11px;
white-space: nowrap;
}
#controlPanel input, #controlPanel select {
background: #2a2e39;
border: 1px solid #434651;
color: #d1d4dc;
padding: 3px 6px;
border-radius: 3px;
font-size: 11px;
min-width: 50px;
}
#controlPanel input:focus, #controlPanel select:focus {
outline: none;
border-color: #2962ff;
}
#symbol { width: 60px !important; text-transform: uppercase; }
.checkbox-label {
display: flex;
align-items: center;
gap: 4px;
color: #787b86;
font-size: 11px;
cursor: pointer;
}
.checkbox-label input { accent-color: #2962ff; }
/* === STATUS BAR === */
.status-bar {
display: flex;
justify-content: center;
gap: 20px;
margin: 6px 0;
font-size: 11px;
color: #787b86;
flex-wrap: wrap;
flex-shrink: 0;
}
.status-bar span { white-space: nowrap; }
#currentPrice { color: #2962ff; font-weight: 500; }
#fundingRate { color: #787b86; }
/* === SIGNAL === */
#signal {
font-size: 13px;
font-weight: 600;
padding: 6px 12px;
background: #1e222d;
border: 1px solid #363a45;
border-radius: 3px;
margin: 6px 0;
text-align: center;
flex-shrink: 0;
}
#signal.long { color: #00c853; border-color: #00c853; }
#signal.short { color: #f23645; border-color: #f23645; }
#signal.neutral { color: #787b86; }
/* === CONFIRMATION DOTS === */
#confirmationPanel {
display: flex;
justify-content: center;
gap: 8px;
margin: 4px 0;
flex-shrink: 0;
}
.confirm-dot {
width: 10px;
height: 10px;
border-radius: 50%;
background: #363a45;
}
.confirm-dot.active-long { background: #00c853; }
.confirm-dot.active-short { background: #f23645; }
/* === STATS & INDICATORS === */
#statsPanel {
margin: 8px 0;
padding: 8px;
background: #1e222d;
border-radius: 4px;
font-size: 11px;
border: 1px solid #363a45;
flex-shrink: 0;
}
#statsText {
line-height: 1.6;
color: #787b86;
margin-bottom: 8px;
text-align: center;
}
.indicators-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
gap: 4px;
}
.indicator-card {
background: #2a2e39;
border: 1px solid #434651;
border-radius: 3px;
padding: 4px 6px;
text-align: center;
}
.indicator-header {
display: flex;
align-items: center;
justify-content: center;
gap: 4px;
margin-bottom: 2px;
padding-bottom: 3px;
border-bottom: 1px solid #363a45;
}
.indicator-icon { font-size: 11px; }
.indicator-title {
font-size: 9px;
color: #787b86;
text-transform: uppercase;
}
.indicator-value {
font-size: 13px;
font-weight: 600;
color: #2962ff;
margin: 2px 0;
}
.indicator-positive { color: #00c853 !important; }
.indicator-negative { color: #f23645 !important; }
.indicator-neutral { color: #ffd700 !important; }
.indicator-detail { font-size: 9px; color: #787b86; }
/* === CHART === */
#chartContainer {
margin: 8px 0;
background: #131722;
border-radius: 4px;
border: 1px solid #363a45;
overflow: hidden;
flex-shrink: 0;
}
#chartHeader {
display: flex;
justify-content: space-between;
align-items: center;
padding: 6px 10px;
background: #1e222d;
border-bottom: 1px solid #363a45;
flex-wrap: wrap;
gap: 4px;
}
#chartTitle {
font-size: 12px;
color: #d1d4dc;
font-weight: 500;
}
#timeframeControls { display: flex; gap: 2px; flex-wrap: wrap; }
.timeframe-btn {
padding: 2px 6px;
background: #2a2e39;
color: #787b86;
border: 1px solid #434651;
border-radius: 2px;
cursor: pointer;
font-size: 10px;
min-width: 28px;
}
.timeframe-btn:hover { background: #363a45; color: #d1d4dc; }
.timeframe-btn.active { background: #2962ff; color: #fff; border-color: #1e53e5; }
#chartWrapper {
position: relative;
width: 100%;
height: 280px;
background: #131722;
}
#deltaChart {
width: 100%;
height: 100%;
display: block;
cursor: crosshair;
}
.chart-overlay {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none;
}
/* Chart controls */
#chartControls {
position: absolute;
top: 8px;
right: 8px;
display: flex;
flex-direction: column;
gap: 3px;
z-index: 10;
pointer-events: none;
}
#chartControls .btn {
pointer-events: auto;
padding: 3px 6px;
font-size: 12px;
min-width: 24px;
}
/* Scale */
.chart-scale {
position: absolute;
right: 2px;
top: 28px;
bottom: 20px;
width: 40px;
pointer-events: none;
}
.scale-label {
position: absolute;
right: 0;
font-size: 9px;
color: #787b86;
text-align: right;
width: 38px;
}
.scale-label.zero { color: #2962ff; font-weight: 600; }
/* Time labels on candles */
.chart-time-labels {
position: absolute;
left: 35px;
right: 42px;
bottom: 22px;
height: 18px;
pointer-events: none;
}
.time-label {
position: absolute;
font-size: 9px;
color: #585b66;
text-align: center;
transform: translateX(-50%);
white-space: nowrap;
}
/* Legend */
.chart-legend {
display: flex;
gap: 12px;
font-size: 9px;
color: #585b66;
padding: 5px 10px;
background: #1e222d;
border-top: 1px solid #363a45;
flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-color { width: 14px; height: 8px; border-radius: 1px; }
.legend-green { background: #00c853; }
.legend-red { background: #f23645; }
.legend-gray { background: #585b66; }
/* Tooltip */
#chartTooltip {
position: absolute;
background: #1e222d;
border: 1px solid #434651;
border-left: 2px solid #2962ff;
padding: 6px 8px;
border-radius: 3px;
font-size: 10px;
pointer-events: none;
display: none;
z-index: 20;
color: #d1d4dc;
min-width: 180px;
}
#chartTooltip .tt-title {
font-weight: 600;
color: #2962ff;
margin-bottom: 3px;
font-size: 11px;
}
#chartTooltip .tt-row {
display: flex;
justify-content: space-between;
margin: 1px 0;
}
#chartTooltip .tt-label { color: #787b86; }
#chartTooltip .tt-value { font-weight: 500; }
#chartTooltip .tt-green { color: #00c853; }
#chartTooltip .tt-red { color: #f23645; }
/* Crosshair */
#crosshair {
position: absolute;
pointer-events: none;
display: none;
z-index: 5;
}
.crosshair-line {
position: absolute;
background: rgba(120, 123, 134, 0.4);
}
.crosshair-v { width: 1px; height: 100%; top: 0; }
.crosshair-h { height: 1px; width: 100%; left: 0; }
#crosshairLabel {
position: absolute;
background: #2962ff;
color: #fff;
padding: 1px 4px;
border-radius: 2px;
font-size: 9px;
white-space: nowrap;
transform: translateX(-50%);
}
/* === TAPES === */
#tapeContainer {
display: flex;
flex-direction: column;
gap: 8px;
flex: 1;
min-height: 0;
}
@media (min-width: 800px) {
#tapeContainer { flex-direction: row; }
}
#tapeContainer > div {
flex: 1;
border: 1px solid #363a45;
padding: 6px;
height: 100%;
max-height: none;
overflow-y: auto;
background: #1e222d;
border-radius: 4px;
}
#tapeContainer h3 {
text-align: center;
margin: 0 0 6px 0;
font-size: 11px;
color: #787b86;
font-weight: 500;
padding-bottom: 4px;
border-bottom: 1px solid #363a45;
}
#tapeContainer h3 span { color: #00c853; }
#tapeContainer h3 span.right { color: #2962ff; }
/* Trades */
.trade {
display: flex;
justify-content: space-between;
padding: 2px 6px;
font-size: 10px;
border-radius: 2px;
margin-bottom: 2px;
font-family: 'Consolas', monospace;
}
.buy { background: rgba(0, 200, 83, 0.1); color: #00c853; }
.sell { background: rgba(242, 54, 69, 0.1); color: #f23645; }
.highlight {
animation: flash 0.4s;
box-shadow: 0 0 0 1px #ffd700 inset;
}
@keyframes flash {
0% { background-color: rgba(255, 215, 0, 0.25); }
100% { background-color: transparent; }
}
/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #1e222d; }
::-webkit-scrollbar-thumb { background: #434651; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: #585b66; }
/* Responsive */
@media (max-width: 500px) {
#chartWrapper { height: 240px; }
.indicators-grid { grid-template-columns: repeat(3, 1fr); }
.header { justify-content: center; }
}
</style>
</head>
<body>
<div class="header">
<h1 id="pageTitle">Trade Tape Reader Binance 3.0.0 | ETH</h1>
<div class="header-btns">
<button id="toggleControlPanelBtn" class="btn">⚙️</button>
<button id="clearRightTapeBtn" class="btn">🧹</button>
<button id="resetChartBtn" class="btn">🔄</button>
</div>
</div>
<div id="controlPanelWrapper" class="collapsed">
<div id="controlPanel">
<label>Тикер:</label>
<input type="text" id="symbol" value="ETH" oninput="onSymbolChange()" />
<label>Рынок:</label>
<select id="marketType" onchange="onSymbolChange()">
<option value="spot">Spot</option>
<option value="futures" selected>Futures</option>
</select>
<label>Мин:</label>
<input type="number" id="minQty" value="10" readonly />
<label>Подсветка:</label>
<input type="number" id="highlightQty" value="50" readonly />
<label>Доп:</label>
<input type="number" id="minQtyRight" value="10" step="0.01" />
<button id="toggleStreamBtn" class="btn btn-primary">▶ Старт</button>
<label class="checkbox-label">
<input type="checkbox" id="autoScroll" checked /> Автоскролл
</label>
<label class="checkbox-label">
<input type="checkbox" id="enableFilter" /> Фильтр
</label>
</div>
</div>
<div class="status-bar">
<span id="wsStatus">🔌 Ожидание</span>
<span id="currentPrice">Цена: —</span>
<span id="fundingRate">Фандинг: —</span>
</div>
<div id="signal" class="neutral">⚪ Ожидание...</div>
<div id="confirmationPanel">
<div class="confirm-dot"></div>
<div class="confirm-dot"></div>
<div class="confirm-dot"></div>
</div>
<div id="statsPanel">
<div id="statsText"></div>
<div class="indicators-grid" id="indicatorsGrid"></div>
</div>
<div id="chartContainer">
<div id="chartHeader">
<span id="chartTitle">Delta Chart</span>
<div id="timeframeControls">
<button class="timeframe-btn active" data-tf="1m">1м</button>
<button class="timeframe-btn" data-tf="5m">5м</button>
<button class="timeframe-btn" data-tf="15m">15м</button>
<button class="timeframe-btn" data-tf="30m">30м</button>
<button class="timeframe-btn" data-tf="1h">1ч</button>
<button class="timeframe-btn" data-tf="2h">2ч</button>
<button class="timeframe-btn" data-tf="1d">1д</button>
</div>
</div>
<div id="chartWrapper">
<canvas id="deltaChart"></canvas>
<div class="chart-overlay">
<div id="crosshair">
<div class="crosshair-line crosshair-v"></div>
<div class="crosshair-line crosshair-h"></div>
<div id="crosshairLabel"></div>
</div>
<div id="chartTooltip"></div>
<div id="chartControls">
<button class="btn" id="zoomInBtn">＋</button>
<button class="btn" id="zoomOutBtn">－</button>
<button class="btn" id="resetViewBtn">⌂</button>
</div>
<div class="chart-scale" id="chartScale"></div>
<div class="chart-time-labels" id="chartTimeLabels"></div>
</div>
</div>
<div class="chart-legend">
<div class="legend-item"><div class="legend-color legend-green"></div> Buy</div>
<div class="legend-item"><div class="legend-color legend-red"></div> Sell</div>
<div class="legend-item"><div class="legend-color legend-gray"></div> 0</div>
<span style="margin-left:auto">Δ с запуска • <span id="currentTfLabel">1м</span></span>
</div>
</div>
<div id="tapeContainer">
<div>
<h3>Лента <span>основная</span></h3>
<div id="tape"></div>
</div>
<div>
<h3>Лента <span class="right">доп</span></h3>
<div id="tapeRight"></div>
</div>
</div>
<script>
// === ГЛОБАЛЬНЫЕ ===
let wsLeft = null, wsRight = null;
let delta = 0, buyVolume = 0, sellVolume = 0;
let lastReset = Date.now(), lastSignal = null, confirmedSignals = [];
let priceHistory = [], deltaHistory = [], volumeHistory = [];
let enableFilter = false;
let reconnectTimeoutLeft = null, reconnectTimeoutRight = null;
let reconnectAttemptsLeft = 0, reconnectAttemptsRight = 0;
const MAX_RECONNECT = 10, RECONNECT_DELAY = 3000;
// === ИНДИКАТОРЫ ===
let vwapSum = 0, vwapVolume = 0, prevPrice = null;
let priceChangeHistory = [], largeBuyTrades = 0, largeSellTrades = 0, totalTrades = 0;
let prevMinuteDelta = 0, signalStrength = 0, currentSignalType = 'neutral';
// === ГРАФИК - ХРАНИМ ВСЮ ИСТОРИЮ ===
let candles = [], currentCandle = null, rawTrades = [];
let chartTimeframe = '1m', cumulativeDeltaStart = 0;
let chartCanvas = null, chartCtx = null, chartWidth = 0, chartHeight = 0;
let maxVisibleCandles = 100, chartSignals = [], lastSignalKey = null;
let zoomLevel = 1, panOffset = 0, isDragging = false, dragStartX = 0, dragStartPan = 0;
let animationFrame = null, needsRender = true;
// === UI ===
const chartTooltip = document.getElementById('chartTooltip');
const crosshair = document.getElementById('crosshair');
const crosshairLabel = document.getElementById('crosshairLabel');
const chartScale = document.getElementById('chartScale');
const chartTimeLabels = document.getElementById('chartTimeLabels');
const currentTfLabel = document.getElementById('currentTfLabel');
// === ТАЙМФРЕЙМЫ ===
const TIMEFRAMES = {
'1m': 60*1000, '5m': 5*60*1000, '15m': 15*60*1000, '30m': 30*60*1000,
'1h': 60*60*1000, '2h': 2*60*60*1000, '1d': 24*60*60*1000
};
// === ЦВЕТА ===
const COLORS = {
bg: '#131722', grid: '#2a2e39', zeroLine: '#2962ff',
candleUp: '#00c853', candleDown: '#f23645',
candleDoji: '#585b66', wick: '#787b86', vwap: '#2962ff',
text: '#787b86', textStrong: '#d1d4dc',
volumeBg: 'rgba(88, 91, 102, 0.15)'
};
// === DOM ===
const controlPanelWrapper = document.getElementById('controlPanelWrapper');
const toggleControlBtn = document.getElementById('toggleControlPanelBtn');
const currentPriceEl = document.getElementById('currentPrice');
const indicatorsGrid = document.getElementById('indicatorsGrid');
// === INIT ===
toggleControlBtn.addEventListener('click', () => {
controlPanelWrapper.classList.toggle('collapsed');
toggleControlBtn.textContent = controlPanelWrapper.classList.contains('collapsed') ? '⚙️' : '⚙️ Скрыть';
});
document.querySelectorAll('.timeframe-btn').forEach(btn => {
btn.addEventListener('click', function() {
document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
this.classList.add('active');
const newTf = this.dataset.tf;
if (newTf !== chartTimeframe) {
chartTimeframe = newTf;
currentTfLabel.textContent = this.textContent;
zoomLevel = 1; panOffset = 0;
recalculateCandles();
requestRender();
}
});
});
document.getElementById('zoomInBtn').addEventListener('click', () => {
zoomLevel = Math.min(3, zoomLevel * 1.25);
requestRender();
});
document.getElementById('zoomOutBtn').addEventListener('click', () => {
zoomLevel = Math.max(0.25, zoomLevel / 1.25);
requestRender();
});
document.getElementById('resetViewBtn').addEventListener('click', () => {
zoomLevel = 1; panOffset = 0; requestRender();
});
document.getElementById('resetChartBtn').addEventListener('click', resetChartOnly);
function onSymbolChange() {
resetAllData();
if (wsLeft) { stopStream(); setTimeout(startStream, 100); }
}
window.onload = () => {
document.getElementById('symbol').focus();
document.getElementById('enableFilter').addEventListener('change', function() {
enableFilter = this.checked;
});
document.getElementById('toggleStreamBtn').addEventListener('click', toggleStream);
document.getElementById('clearRightTapeBtn').addEventListener('click', () => {
document.getElementById('tapeRight').innerHTML = '';
});
initChart();
setupChartInteractions();
window.addEventListener('resize', () => { initChartCanvas(); requestRender(); });
setTimeout(() => { startStream(); startRightStream(); }, 300);
};
// === CHART INIT ===
function initChart() {
initChartCanvas();
requestRender();
}
function initChartCanvas() {
chartCanvas = document.getElementById('deltaChart');
if (!chartCanvas) return;
chartCtx = chartCanvas.getContext('2d', { alpha: false });
const wrapper = document.getElementById('chartWrapper');
chartWidth = wrapper.clientWidth;
chartHeight = wrapper.clientHeight;
const dpr = window.devicePixelRatio || 1;
chartCanvas.width = chartWidth * dpr;
chartCanvas.height = chartHeight * dpr;
chartCanvas.style.width = chartWidth + 'px';
chartCanvas.style.height = chartHeight + 'px';
chartCtx.scale(dpr, dpr);
chartCtx.imageSmoothingEnabled = true;
}
// === RAW TRADES - ХРАНИМ ВСЮ ИСТОРИЮ ===
function storeRawTrade(timestamp, tradeDelta, qty, isBuy, price) {
rawTrades.push({ timestamp, tradeDelta, qty, isBuy, price });
if (rawTrades.length > 500000) rawTrades.splice(0, rawTrades.length - 500000);
}
// === CANDLE MODEL ===
function createCandle(tf, start, openVal) {
return {
timeframe: tf, startTime: start, endTime: start + TIMEFRAMES[tf],
open: openVal, high: openVal, low: openVal, close: openVal,
volume: 0, buyVolume: 0, sellVolume: 0, delta: 0
};
}
function updateCandle(candle, tradeDelta, qty, isBuy) {
candle.volume += qty;
if (isBuy) candle.buyVolume += qty; else candle.sellVolume += qty;
candle.close += tradeDelta;
if (candle.close > candle.high) candle.high = candle.close;
if (candle.close < candle.low) candle.low = candle.close;
candle.delta = candle.close - candle.open;
}
function finalizeCandle(c) {
if (c) {
candles.push(c);
if (candles.length > 500) candles.shift();
}
}
function getCandleStart(ts, tf) {
const ms = TIMEFRAMES[tf];
return Math.floor(ts / ms) * ms;
}
// === RECALCULATE ===
function recalculateCandles() {
if (rawTrades.length === 0) {
candles = [];
currentCandle = null;
return;
}
candles = [];
let cumDelta = cumulativeDeltaStart;
const firstTs = rawTrades[0].timestamp;
let candleStart = getCandleStart(firstTs, chartTimeframe);
let tempCandle = createCandle(chartTimeframe, candleStart, cumDelta);
for (const t of rawTrades) {
const cs = getCandleStart(t.timestamp, chartTimeframe);
if (cs !== candleStart) {
finalizeCandle(tempCandle);
cumDelta = tempCandle.close;
candleStart = cs;
tempCandle = createCandle(chartTimeframe, candleStart, cumDelta);
}
updateCandle(tempCandle, t.tradeDelta, t.qty, t.isBuy);
}
currentCandle = tempCandle;
cumulativeDeltaStart = currentCandle ? currentCandle.close : cumDelta;
}
// === RENDER ===
function requestRender() {
needsRender = true;
if (!animationFrame) animationFrame = requestAnimationFrame(doRender);
}
function doRender() {
animationFrame = null;
if (needsRender) { needsRender = false; renderChart(); }
}
function renderChart() {
if (!chartCtx) return;
const W = chartWidth, H = chartHeight;
chartCtx.fillStyle = COLORS.bg;
chartCtx.fillRect(0, 0, W, H);
const allC = currentCandle ? [...candles, currentCandle] : [...candles];
if (allC.length === 0) { drawEmptyState(); return; }
const effectiveCandles = Math.max(30, Math.floor(maxVisibleCandles / zoomLevel));
const startIndex = Math.max(0, allC.length - effectiveCandles + Math.floor(-panOffset * effectiveCandles / 10));
const visible = allC.slice(startIndex, startIndex + effectiveCandles);
if (visible.length === 0) { drawEmptyState(); return; }
const minD = Math.min(...visible.map(c => c.low));
const maxD = Math.max(...visible.map(c => c.high));
const range = (maxD - minD) || 1;
const pad = range * 0.15;
const minY = minD - pad, maxY = maxD + pad, yRange = (maxY - minY) || 1;
const plotLeft = 35, plotRight = W - 42, plotTop = 10, plotBottom = H - 22;
const plotW = plotRight - plotLeft, plotH = plotBottom - plotTop;
const candleW = Math.max(3, plotW / visible.length - 2);
const zeroY = plotBottom - ((0 - minY) / yRange) * plotH;
drawGrid(plotLeft, plotRight, plotTop, plotBottom, zeroY);
