<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Trade Tape Reader - Delta Chart</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
background: #131722;
color: #d1d4dc;
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
padding: 10px;
font-size: 12px;
line-height: 1.4;
display: flex;
flex-direction: column;
min-height: 100vh;
}
.header {
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 8px;
margin-bottom: 8px;
flex-shrink: 0;
}
.header h1 {
font-size: 14px;
font-weight: 600;
color: #ffd700;
margin: 0;
}
.header-btns {
display: flex;
gap: 6px;
flex-wrap: wrap;
}
.btn {
padding: 4px 10px;
background: #2a2e39;
color: #787b86;
border: 1px solid #434651;
border-radius: 3px;
cursor: pointer;
font-size: 11px;
transition: background 0.15s;
}
.btn:hover { background: #363a45; color: #d1d4dc; }
.btn.active { background: #2962ff; color: #fff; border-color: #1e53e5; }
.btn-primary { background: #2962ff; color: #fff; border-color: #1e53e5; }
.btn-secondary { background: #363a45; color: #d1d4dc; border-color: #434651; }
.btn-danger { background: #f23645; color: #fff; border-color: #e04848; }
#settingsModal {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.7);
z-index: 100000;
align-items: center;
justify-content: center;
}
#settingsModal.show {
display: flex;
}
#settingsModalContent {
background: #1e222d;
border: 1px solid #363a45;
border-radius: 8px;
padding: 20px;
max-width: 500px;
width: 90%;
max-height: 80vh;
overflow-y: auto;
position: relative;
}
#settingsModalHeader {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 15px;
padding-bottom: 10px;
border-bottom: 1px solid #363a45;
}
#settingsModalHeader h2 {
font-size: 14px;
color: #d1d4dc;
}
#closeSettingsBtn {
background: none;
border: none;
color: #787b86;
font-size: 20px;
cursor: pointer;
padding: 0 5px;
}
#closeSettingsBtn:hover { color: #d1d4dc; }
.settings-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 12px;
flex-wrap: wrap;
}
.settings-row label {
color: #787b86;
font-size: 11px;
white-space: nowrap;
min-width: 70px;
}
.settings-row input, .settings-row select {
background: #2a2e39;
border: 1px solid #434651;
color: #d1d4dc;
padding: 6px 10px;
border-radius: 3px;
font-size: 11px;
flex: 1;
min-width: 120px;
}
.settings-row input:focus, .settings-row select:focus {
outline: none;
border-color: #2962ff;
}
.settings-row input:disabled {
background: #1e222d;
color: #585b66;
border-color: #363a45;
}
#symbolContainer {
position: relative;
flex: 1;
min-width: 120px;
}
#symbol {
width: 100% !important;
text-transform: uppercase;
}
.checkbox-label {
display: flex;
align-items: center;
gap: 6px;
color: #787b86;
font-size: 11px;
cursor: pointer;
}
.checkbox-label input { accent-color: #2962ff; }
.auto-mode-label {
display: flex;
align-items: center;
gap: 6px;
color: #2962ff;
font-size: 11px;
cursor: pointer;
margin-left: auto;
}
.auto-mode-label input { accent-color: #2962ff; }
#autocompleteList {
position: absolute;
top: 100%;
left: 0;
right: 0;
background: #1e222d;
border: 1px solid #434651;
border-radius: 4px;
max-height: 300px;
overflow-y: auto;
z-index: 100001 !important;
display: none;
box-shadow: 0 8px 24px rgba(0,0,0,0.5);
min-width: 200px;
margin-top: 2px;
}
#autocompleteList.show {
display: block !important;
}
.autocomplete-item {
padding: 8px 12px;
cursor: pointer;
font-size: 12px;
color: #d1d4dc;
border-bottom: 1px solid #2a2e39;
display: flex;
justify-content: space-between;
align-items: center;
}
.autocomplete-item:hover, .autocomplete-item.selected {
background: #2962ff;
color: #fff;
}
.autocomplete-item span.base {
color: #00c853;
font-weight: 600;
font-size: 13px;
}
.autocomplete-item span.quote {
color: #787b86;
font-size: 11px;
}
.autocomplete-no-results {
padding: 15px;
text-align: center;
color: #787b86;
font-size: 11px;
}
.status-bar {
display: flex;
justify-content: center;
gap: 20px;
margin: 6px 0;
font-size: 11px;
color: #787b86;
flex-wrap: wrap;
flex-shrink: 0;
}
.status-bar span { white-space: nowrap; }
#currentPrice { color: #2962ff; font-weight: 500; }
#fundingRate { color: #787b86; }
#signal {
font-size: 13px;
font-weight: 600;
padding: 6px 12px;
background: #1e222d;
border: 1px solid #363a45;
border-radius: 3px;
margin: 6px 0;
text-align: center;
flex-shrink: 0;
}
#signal.long { color: #00c853; border-color: #00c853; }
#signal.short { color: #f23645; border-color: #f23645; }
#signal.neutral { color: #787b86; }
#confirmationPanel {
display: flex;
justify-content: center;
gap: 8px;
margin: 4px 0;
flex-shrink: 0;
}
.confirm-dot {
width: 10px;
height: 10px;
border-radius: 50%;
background: #363a45;
}
.confirm-dot.active-long { background: #00c853; }
.confirm-dot.active-short { background: #f23645; }
#statsPanel {
margin: 8px 0;
padding: 8px;
background: #1e222d;
border-radius: 4px;
font-size: 11px;
border: 1px solid #363a45;
flex-shrink: 0;
}
#statsText {
line-height: 1.6;
color: #787b86;
margin-bottom: 8px;
text-align: center;
}
.indicators-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
gap: 4px;
}
.indicator-card {
background: #2a2e39;
border: 1px solid #434651;
border-radius: 3px;
padding: 4px 6px;
text-align: center;
}
.indicator-header {
display: flex;
align-items: center;
justify-content: center;
gap: 4px;
margin-bottom: 2px;
padding-bottom: 3px;
border-bottom: 1px solid #363a45;
}
.indicator-icon { font-size: 11px; }
.indicator-title {
font-size: 9px;
color: #787b86;
text-transform: uppercase;
}
.indicator-value {
font-size: 13px;
font-weight: 600;
color: #2962ff;
margin: 2px 0;
}
.indicator-positive { color: #00c853 !important; }
.indicator-negative { color: #f23645 !important; }
.indicator-neutral { color: #ffd700 !important; }
.indicator-detail { font-size: 9px; color: #787b86; }
#chartContainer {
margin: 8px 0;
background: #131722;
border-radius: 4px;
border: 1px solid #363a45;
overflow: hidden;
flex-shrink: 0;
}
#chartHeader {
display: flex;
justify-content: space-between;
align-items: center;
padding: 6px 10px;
background: #1e222d;
border-bottom: 1px solid #363a45;
flex-wrap: wrap;
gap: 4px;
}
#chartTitle {
font-size: 12px;
color: #d1d4dc;
font-weight: 500;
}
#timeframeControls { display: flex; gap: 2px; flex-wrap: wrap; }
.timeframe-btn {
padding: 2px 6px;
background: #2a2e39;
color: #787b86;
border: 1px solid #434651;
border-radius: 2px;
cursor: pointer;
font-size: 10px;
min-width: 28px;
}
.timeframe-btn:hover { background: #363a45; color: #d1d4dc; }
.timeframe-btn.active { background: #2962ff; color: #fff; border-color: #1e53e5; }
#chartWrapper {
position: relative;
width: 100%;
height: 280px;
background: #131722;
}
#deltaChart {
width: 100%;
height: 100%;
display: block;
cursor: crosshair;
}
.chart-overlay {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none;
}
.chart-scale {
position: absolute;
right: 2px;
top: 28px;
bottom: 20px;
width: 40px;
pointer-events: none;
}
.scale-label {
position: absolute;
right: 0;
font-size: 9px;
color: #787b86;
text-align: right;
width: 38px;
}
.scale-label.zero { color: #2962ff; font-weight: 600; }
.chart-time-labels {
position: absolute;
left: 35px;
right: 42px;
bottom: 22px;
height: 18px;
pointer-events: none;
}
.time-label {
position: absolute;
font-size: 9px;
color: #585b66;
text-align: center;
transform: translateX(-50%);
white-space: nowrap;
}
.chart-legend {
display: flex;
gap: 12px;
font-size: 9px;
color: #585b66;
padding: 5px 10px;
background: #1e222d;
border-top: 1px solid #363a45;
flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-color { width: 14px; height: 8px; border-radius: 1px; }
.legend-green { background: #00c853; }
.legend-red { background: #f23645; }
.legend-gray { background: #585b66; }
#chartTooltip {
position: absolute;
background: #1e222d;
border: 1px solid #434651;
border-left: 2px solid #2962ff;
padding: 6px 8px;
border-radius: 3px;
font-size: 10px;
pointer-events: none;
display: none;
z-index: 20;
color: #d1d4dc;
min-width: 180px;
}
#chartTooltip .tt-title {
font-weight: 600;
color: #2962ff;
margin-bottom: 3px;
font-size: 11px;
}
#chartTooltip .tt-row {
display: flex;
justify-content: space-between;
margin: 1px 0;
}
#chartTooltip .tt-label { color: #787b86; }
#chartTooltip .tt-value { font-weight: 500; }
#chartTooltip .tt-green { color: #00c853; }
#chartTooltip .tt-red { color: #f23645; }
#crosshair {
position: absolute;
pointer-events: none;
display: none;
z-index: 5;
}
.crosshair-line {
position: absolute;
background: rgba(120, 123, 134, 0.4);
}
.crosshair-v { width: 1px; height: 100%; top: 0; }
.crosshair-h { height: 1px; width: 100%; left: 0; }
#crosshairLabel {
position: absolute;
background: #2962ff;
color: #fff;
padding: 1px 4px;
border-radius: 2px;
font-size: 9px;
white-space: nowrap;
transform: translateX(-50%);
}
#tapeContainer {
display: flex;
flex-direction: column;
gap: 8px;
flex: 1;
min-height: 0;
}
@media (min-width: 800px) {
#tapeContainer { flex-direction: row; }
}
#tapeContainer > div {
flex: 1;
border: 1px solid #363a45;
padding: 6px;
height: 100%;
max-height: none;
overflow-y: auto;
background: #1e222d;
border-radius: 4px;
}
#tapeContainer h3 {
text-align: center;
margin: 0 0 6px 0;
font-size: 11px;
color: #787b86;
font-weight: 500;
padding-bottom: 4px;
border-bottom: 1px solid #363a45;
}
#tapeContainer h3 span { color: #00c853; }
#tapeContainer h3 span.right { color: #2962ff; }
.trade {
display: flex;
justify-content: space-between;
padding: 2px 6px;
font-size: 10px;
border-radius: 2px;
margin-bottom: 2px;
font-family: 'Consolas', monospace;
}
.buy { background: rgba(0, 200, 83, 0.1); color: #00c853; }
.sell { background: rgba(242, 54, 69, 0.1); color: #f23645; }
.highlight {
animation: flash 0.4s;
box-shadow: 0 0 0 1px #ffd700 inset;
}
@keyframes flash {
0% { background-color: rgba(255, 215, 0, 0.25); }
100% { background-color: transparent; }
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #1e222d; }
::-webkit-scrollbar-thumb { background: #434651; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: #585b66; }
@media (max-width: 500px) {
#chartWrapper { height: 240px; }
.indicators-grid { grid-template-columns: repeat(3, 1fr); }
.header { justify-content: center; }
}
</style>
</head>
<body>
<div class="header">
<h1 id="pageTitle">Trade Tape Reader Binance 3.0.0 | ETH</h1>
<div class="header-btns">
<button id="openSettingsBtn" class="btn">⚙️ Настройки</button>
<button id="clearRightTapeBtn" class="btn">🧹</button>
<button id="resetChartBtn" class="btn">🔄</button>
</div>
</div>
<!-- MODAL SETTINGS -->
<div id="settingsModal">
<div id="settingsModalContent">
<div id="settingsModalHeader">
<h2>⚙️ Настройки</h2>
<button id="closeSettingsBtn">×</button>
</div>
<div class="settings-row">
<label>Тикер:</label>
<div id="symbolContainer">
<input type="text" id="symbol" value="ETHUSDT" autocomplete="off" />
<div id="autocompleteList"></div>
</div>
</div>
<div class="settings-row">
<label>Рынок:</label>
<select id="marketType">
<option value="spot">Spot</option>
<option value="futures" selected>Futures</option>
</select>
</div>
<div class="settings-row">
<label>Мин объём:</label>
<input type="number" id="minQty" value="10" step="0.01" />
<label class="auto-mode-label">
<input type="checkbox" id="autoMinQty" checked /> Авто
</label>
</div>
<div class="settings-row">
<label>Подсветка:</label>
<input type="number" id="highlightQty" value="50" step="0.01" />
<label class="auto-mode-label">
<input type="checkbox" id="autoHighlightQty" checked /> Авто
</label>
</div>
<div class="settings-row">
<label>Доп. фильтр:</label>
<input type="number" id="minQtyRight" value="10" step="0.01" />
<label class="auto-mode-label">
<input type="checkbox" id="autoMinQtyRight" checked /> Авто
</label>
</div>
<div class="settings-row">
<label class="checkbox-label">
<input type="checkbox" id="autoScroll" checked /> Автоскролл
</label>
</div>
<div class="settings-row">
<label class="checkbox-label">
<input type="checkbox" id="enableFilter" /> Фильтр по объёму
</label>
</div>
<div class="settings-row" style="margin-top: 15px; justify-content: flex-end; gap: 8px;">
<button id="saveOnlyBtn" class="btn btn-secondary">💾 Сохранить</button>
<button id="saveSettingsBtn" class="btn btn-primary">💾 Сохранить и Перезапустить</button>
</div>
</div>
</div>
<div class="status-bar">
<span id="wsStatus">🔌 Ожидание</span>
<span id="currentPrice">Цена: —</span>
<span id="fundingRate">Фандинг: —</span>
</div>
<div id="signal" class="neutral">⚪ Ожидание...</div>
<div id="confirmationPanel">
<div class="confirm-dot"></div>
<div class="confirm-dot"></div>
<div class="confirm-dot"></div>
</div>
<div id="statsPanel">
<div id="statsText"></div>
<div class="indicators-grid" id="indicatorsGrid"></div>
</div>
<div id="chartContainer">
<div id="chartHeader">
<span id="chartTitle">Delta Chart</span>
<div id="timeframeControls">
<button class="timeframe-btn active" data-tf="1m">1м</button>
<button class="timeframe-btn" data-tf="5m">5м</button>
<button class="timeframe-btn" data-tf="15m">15м</button>
<button class="timeframe-btn" data-tf="30m">30м</button>
<button class="timeframe-btn" data-tf="1h">1ч</button>
<button class="timeframe-btn" data-tf="2h">2ч</button>
<button class="timeframe-btn" data-tf="1d">1д</button>
</div>
</div>
<div id="chartWrapper">
<canvas id="deltaChart"></canvas>
<div class="chart-overlay">
<div id="crosshair">
<div class="crosshair-line crosshair-v"></div>
<div class="crosshair-line crosshair-h"></div>
<div id="crosshairLabel"></div>
</div>
<div id="chartTooltip"></div>
<div class="chart-scale" id="chartScale"></div>
<div class="chart-time-labels" id="chartTimeLabels"></div>
</div>
</div>
<div class="chart-legend">
<div class="legend-item"><div class="legend-color legend-green"></div> Buy</div>
<div class="legend-item"><div class="legend-color legend-red"></div> Sell</div>
<div class="legend-item"><div class="legend-color legend-gray"></div> 0</div>
<span style="margin-left:auto">Δ с запуска • <span id="currentTfLabel">1м</span></span>
</div>
</div>
<div id="tapeContainer">
<div>
<h3>Лента <span>основная</span></h3>
<div id="tape"></div>
</div>
<div>
<h3>Лента <span class="right">доп</span></h3>
<div id="tapeRight"></div>
</div>
</div>
<script>
// === ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===
let wsLeft = null;
let wsRight = null;
let reconnectTimeoutLeft = null;
let reconnectTimeoutRight = null;
let reconnectAttemptsLeft = 0;
let reconnectAttemptsRight = 0;
const MAX_RECONNECT = 3;
const RECONNECT_DELAY = 2000;
// === Данные ===
let delta = 0;
let buyVolume = 0;
let sellVolume = 0;
let lastReset = Date.now();
let lastSignal = null;
let confirmedSignals = [];
let priceHistory = [];
let deltaHistory = [];
let volumeHistory = [];
let enableFilter = false;
// === Индикаторы ===
let vwapSum = 0;
let vwapVolume = 0;
let prevPrice = null;
let priceChangeHistory = [];
let largeBuyTrades = 0;
let largeSellTrades = 0;
let totalTrades = 0;
let prevMinuteDelta = 0;
let signalStrength = 0;
let currentSignalType = 'neutral';
// === График ===
let candles = [];
let currentCandle = null;
let rawTrades = [];
let chartTimeframe = '1m';
let cumulativeDeltaStart = 0;
let chartCanvas = null;
let chartCtx = null;
let chartWidth = 0;
let chartHeight = 0;
let maxVisibleCandles = 100;
let chartSignals = [];
let lastSignalKey = null;
let zoomLevel = 1;
let panOffset = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartPan = 0;
let animationFrame = null;
let needsRender = true;
// === Текущий символ ===
let currentFullSymbol = 'ETHUSDT';
let isStreamActive = false;
// === Autocomplete ===
let availableSymbols = [];
let selectedSymbolIndex = -1;
let hideTimeout = null;
let symbolsLoaded = false;
let symbolsLoading = false;
// === Режимы (авто/ручной) ===
let autoMinQty = true;
let autoHighlightQty = true;
let autoMinQtyRight = true;
// === UI Элементы ===
const settingsModal = document.getElementById('settingsModal');
const openSettingsBtn = document.getElementById('openSettingsBtn');
const closeSettingsBtn = document.getElementById('closeSettingsBtn');
const saveSettingsBtn = document.getElementById('saveSettingsBtn');
const saveOnlyBtn = document.getElementById('saveOnlyBtn');
const symbolInput = document.getElementById('symbol');
const autocompleteList = document.getElementById('autocompleteList');
const marketTypeSelect = document.getElementById('marketType');
const chartTooltip = document.getElementById('chartTooltip');
const crosshair = document.getElementById('crosshair');
const crosshairLabel = document.getElementById('crosshairLabel');
const chartScale = document.getElementById('chartScale');
const chartTimeLabels = document.getElementById('chartTimeLabels');
const currentTfLabel = document.getElementById('currentTfLabel');
const currentPriceEl = document.getElementById('currentPrice');
const indicatorsGrid = document.getElementById('indicatorsGrid');
const pageTitle = document.getElementById('pageTitle');
const wsStatus = document.getElementById('wsStatus');
const fundingRateEl = document.getElementById('fundingRate');
const signalEl = document.getElementById('signal');
const tapeEl = document.getElementById('tape');
const tapeRightEl = document.getElementById('tapeRight');
const statsTextEl = document.getElementById('statsText');
const confirmationDots = document.querySelectorAll('#confirmationPanel .confirm-dot');
const autoMinQtyCheckbox = document.getElementById('autoMinQty');
const autoHighlightQtyCheckbox = document.getElementById('autoHighlightQty');
const autoMinQtyRightCheckbox = document.getElementById('autoMinQtyRight');
const minQtyInput = document.getElementById('minQty');
const highlightQtyInput = document.getElementById('highlightQty');
const minQtyRightInput = document.getElementById('minQtyRight');
// === Таймфреймы ===
const TIMEFRAMES = {
'1m': 60*1000,
'5m': 5*60*1000,
'15m': 15*60*1000,
'30m': 30*60*1000,
'1h': 60*60*1000,
'2h': 2*60*60*1000,
'1d': 24*60*60*1000
};
// === Цвета ===
const COLORS = {
bg: '#131722',
grid: '#2a2e39',
zeroLine: '#2962ff',
candleUp: '#00c853',
candleDown: '#f23645',
candleDoji: '#585b66',
wick: '#787b86',
vwap: '#2962ff',
text: '#787b86',
textStrong: '#d1d4dc',
volumeBg: 'rgba(88, 91, 102, 0.15)'
};
// === Модальное окно ===
openSettingsBtn.addEventListener('click', () => {
settingsModal.classList.add('show');
});
closeSettingsBtn.addEventListener('click', () => {
settingsModal.classList.remove('show');
hideAutocomplete();
});
settingsModal.addEventListener('click', (e) => {
if (e.target === settingsModal) {
settingsModal.classList.remove('show');
hideAutocomplete();
}
});
saveSettingsBtn.addEventListener('click', () => {
settingsModal.classList.remove('show');
hideAutocomplete();
onSymbolChange();
});
saveOnlyBtn.addEventListener('click', () => {
settingsModal.classList.remove('show');
hideAutocomplete();
saveSettingsOnly();
});
// === Сохранение настроек без перезапуска ===
function saveSettingsOnly() {
// Сохраняем режимы
autoMinQty = autoMinQtyCheckbox.checked;
autoHighlightQty = autoHighlightQtyCheckbox.checked;
autoMinQtyRight = autoMinQtyRightCheckbox.checked;
enableFilter = document.getElementById('enableFilter').checked;
// Обновляем состояние полей
updateInputStates();
}
// === Обновление состояния полей ввода ===
function updateInputStates() {
minQtyInput.disabled = autoMinQty;
highlightQtyInput.disabled = autoHighlightQty;
minQtyRightInput.disabled = autoMinQtyRight;
}
// === Таймфреймы ===

// === Загрузка списка с Binance ===
async function fetchAvailableSymbols() {
if (symbolsLoaded || symbolsLoading) return;
symbolsLoading = true;
const market = marketTypeSelect.value;
const url = market === 'spot'
? 'https://api.binance.com/api/v3/exchangeInfo'
: 'https://fapi.binance.com/fapi/v1/exchangeInfo';
try {
const response = await fetch(url);
if (!response.ok) throw new Error('HTTP ' + response.status);
const data = await response.json();
const baseAssetSet = new Set();
availableSymbols = data.symbols
.filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING')
.filter(s => {
if (baseAssetSet.has(s.baseAsset)) return false;
baseAssetSet.add(s.baseAsset);
return true;
})
.map(s => ({
symbol: s.symbol,
baseAsset: s.baseAsset,
quoteAsset: s.quoteAsset
}))
.sort((a, b) => a.baseAsset.localeCompare(b.baseAsset));
symbolsLoaded = true;
symbolsLoading = false;
} catch (error) {
console.error('Ошибка:', error);
symbolsLoading = false;
availableSymbols = [
{ symbol: 'BTCUSDT', baseAsset: 'BTC', quoteAsset: 'USDT' },
{ symbol: 'ETHUSDT', baseAsset: 'ETH', quoteAsset: 'USDT' },
{ symbol: 'BNBUSDT', baseAsset: 'BNB', quoteAsset: 'USDT' }
];
symbolsLoaded = true;
}
}
// === Фильтрация - ИСПРАВЛЕНО: startsWith вместо includes ===
function filterSymbols(query) {
if (!query || query.trim() === '') {
return availableSymbols.slice(0, 50);
}
const q = query.toUpperCase().trim();
return availableSymbols
.filter(s => s.baseAsset.startsWith(q))
.slice(0, 50);
}

function renderAutocomplete(filtered) {

} else if (filtered.length === 0) {
autocompleteList.innerHTML = '<div class="autocomplete-no-results">Нет совпадений</div>';
} else {
autocompleteList.innerHTML = filtered.map((s, i) =>
`<div class="autocomplete-item ${i === selectedSymbolIndex ? 'selected' : ''}"
data-index="${i}"
data-symbol="${s.symbol}"
onclick="selectSymbol('${s.symbol}')">
<span class="base">${s.baseAsset}</span>
<span class="quote">/${s.quoteAsset}</span>
</div>`
).join('');
}
}

function initChartCanvas() {

if (!chartCanvas) return;

function storeRawTrade(timestamp, tradeDelta, qty, isBuy, price) {
rawTrades.push({ timestamp, tradeDelta, qty, isBuy, price });
if (rawTrades.length > 500000) {
rawTrades.splice(0, rawTrades.length - 500000);
}
}
function createCandle(tf, start, openVal) {
return {
timeframe: tf,
startTime: start,
endTime: start + TIMEFRAMES[tf],
open: openVal,
high: openVal,
low: openVal,
close: openVal,
volume: 0,
buyVolume: 0,
sellVolume: 0,
delta: 0
};
}
function updateCandle(candle, tradeDelta, qty, isBuy) {
candle.volume += qty;
if (isBuy) {
candle.buyVolume += qty;
} else {
candle.sellVolume += qty;
}
candle.close += tradeDelta;
if (candle.close > candle.high) candle.high = candle.close;
if (candle.close < candle.low) candle.low = candle.close;
candle.delta = candle.close - candle.open;
}
function finalizeCandle(c) {
if (c) {
candles.push(c);
if (candles.length > 500) candles.shift();
}
}
function getCandleStart(ts, tf) {
const ms = TIMEFRAMES[tf];
return Math.floor(ts / ms) * ms;
}
function recalculateCandles() {
if (rawTrades.length === 0) {
candles = [];
currentCandle = null;
return;
}
candles = [];
let cumDelta = cumulativeDeltaStart;
const firstTs = rawTrades[0].timestamp;
let candleStart = getCandleStart(firstTs, chartTimeframe);
let tempCandle = createCandle(chartTimeframe, candleStart, cumDelta);
for (const t of rawTrades) {
const cs = getCandleStart(t.timestamp, chartTimeframe);
if (cs !== candleStart) {
finalizeCandle(tempCandle);
cumDelta = tempCandle.close;
candleStart = cs;
tempCandle = createCandle(chartTimeframe, candleStart, cumDelta);
}
updateCandle(tempCandle, t.tradeDelta, t.qty, t.isBuy);
}
currentCandle = tempCandle;
cumulativeDeltaStart = currentCandle ? currentCandle.close : cumDelta;
}
function requestRender() {
needsRender = true;
if (!animationFrame) {
animationFrame = requestAnimationFrame(doRender);
}
}
function doRender() {
animationFrame = null;
if (needsRender) {
needsRender = false;
renderChart();
}
}
function renderChart() {
if (!chartCtx) return;
const W = chartWidth, H = chartHeight;
chartCtx.fillStyle = COLORS.bg;
chartCtx.fillRect(0, 0, W, H);
const allC = currentCandle ? [...candles, currentCandle] : [...candles];
if (allC.length === 0) {
drawEmptyState();
return;
}
const effectiveCandles = Math.max(30, Math.floor(maxVisibleCandles / zoomLevel));
const startIndex = Math.max(0, allC.length - effectiveCandles + Math.floor(-panOffset * effectiveCandles / 10));
const visible = allC.slice(startIndex, startIndex + effectiveCandles);
if (visible.length === 0) {
drawEmptyState();
return;
}
const minD = Math.min(...visible.map(c => c.low));
const maxD = Math.max(...visible.map(c => c.high));
const range = (maxD - minD) || 1;
const pad = range * 0.15;
const minY = minD - pad, maxY = maxD + pad, yRange = (maxY - minY) || 1;
const plotLeft = 35, plotRight = W - 42, plotTop = 10, plotBottom = H - 22;
const plotW = plotRight - plotLeft, plotH = plotBottom - plotTop;
const candleW = Math.max(3, plotW / visible.length - 2);
const zeroY = plotBottom - ((0 - minY) / yRange) * plotH;
drawGrid(plotLeft, plotRight, plotTop, plotBottom, zeroY);
drawCandles(visible, candleW, plotLeft, plotTop, plotBottom, minY, yRange, zeroY);
drawSignals(visible, candleW, plotLeft, plotTop, plotBottom, zeroY);
drawScaleLabels(plotRight, plotTop, plotBottom, minY, maxY, yRange, zeroY);
drawTimeLabels(visible, candleW, plotLeft, plotBottom);
visible.forEach((c, i) => {
c._x = plotLeft + 5 + i * (candleW + 2) + candleW/2;
c._y = {
o: plotBottom - ((c.open - minY)/yRange)*plotH,
c: plotBottom - ((c.close - minY)/yRange)*plotH,
h: plotBottom - ((c.high - minY)/yRange)*plotH,
l: plotBottom - ((c.low - minY)/yRange)*plotH
};
});
}
function drawEmptyState() {
chartCtx.fillStyle = COLORS.text;
chartCtx.font = '12px sans-serif';
chartCtx.textAlign = 'center';
chartCtx.fillText('Ожидание данных...', chartWidth/2, chartHeight/2);
}
function drawGrid(l, r, t, b, zeroY) {
const ctx = chartCtx;
ctx.strokeStyle = COLORS.grid;
ctx.lineWidth = 1;
for (let i = 0; i <= 5; i++) {
const y = b - (i/5) * (b - t);
ctx.beginPath();
ctx.moveTo(l, y);
ctx.lineTo(r, y);
ctx.stroke();
}
ctx.strokeStyle = COLORS.zeroLine;
ctx.lineWidth = 1;
ctx.setLineDash([4, 4]);
ctx.beginPath();
ctx.moveTo(l, zeroY);
ctx.lineTo(r, zeroY);
ctx.stroke();
ctx.setLineDash([]);
}
function drawCandles(candles, cw, pl, pt, pb, min, range, zeroY) {
const ctx = chartCtx;
candles.forEach((c, idx) => {
const x = pl + 5 + idx * (cw + 2);
const oY = pb - ((c.open - min)/range) * (pb - pt);
const cY = pb - ((c.close - min)/range) * (pb - pt);
const hY = pb - ((c.high - min)/range) * (pb - pt);
const lY = pb - ((c.low - min)/range) * (pb - pt);
const up = c.close >= c.open;
const bodyTop = Math.min(oY, cY);
const bodyH = Math.max(1, Math.abs(cY - oY));
ctx.fillStyle = COLORS.volumeBg;
ctx.fillRect(x - cw/2, pb, cw, 16);
ctx.strokeStyle = COLORS.wick;
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(x, hY);
ctx.lineTo(x, lY);
ctx.stroke();
ctx.fillStyle = up ? COLORS.candleUp : COLORS.candleDown;
ctx.fillRect(x - cw/2 + 0.5, bodyTop, cw - 1, bodyH);
});
}
function drawSignals(candles, cw, pl, pt, pb, zeroY) {
const ctx = chartCtx;
chartSignals.forEach(sig => {
const idx = candles.findIndex(c => c.startTime === sig.time);
if (idx === -1 || !candles[idx]._x) return;
const x = candles[idx]._x;
ctx.font = 'bold 12px sans-serif';
ctx.textAlign = 'center';
if (sig.type === 'long') {
ctx.fillStyle = 'rgba(0, 200, 83, 0.8)';
ctx.fillText('▲', x, zeroY + 18);
} else if (sig.type === 'short') {
ctx.fillStyle = 'rgba(242, 54, 69, 0.8)';
ctx.fillText('▼', x, zeroY - 10);
}
});
}
function drawScaleLabels(right, top, bottom, min, max, range, zeroY) {
chartScale.innerHTML = '';
for (let i = 0; i <= 5; i++) {
const val = min + (i/5) * range;
const y = bottom - (i/5) * (bottom - top);
const label = document.createElement('div');

function drawTimeLabels(candles, cw, pl, pb) {

if (priceChangeHistory.length > 60) priceChangeHistory.shift();
}
prevPrice = price;
totalTrades++;
volumeHistory.push(qty);
if (volumeHistory.length > 60) volumeHistory.shift();
const vm = volumeHistory.reduce((a,b)=>a+b,0)/volumeHistory.length;
// === АВТО/РУЧНОЙ РЕЖИМ ДЛЯ ПОЛЕЙ ===
const hlQty = autoHighlightQty ? (vm * 1.5) : parseFloat(highlightQtyInput.value) || 50;
if (qty >= hlQty) {
if (maker) largeSellTrades++;
else largeBuyTrades++;
}
const mnQty = autoMinQty ? Math.max(1, vm * 0.5) : parseFloat(minQtyInput.value) || 10;
if (enableFilter && qty < mnQty) return;
// Обновляем значения в полях только в авто-режиме
if (autoMinQty) {
document.getElementById('minQty').value = mnQty.toFixed(2);
}
if (autoHighlightQty) {
document.getElementById('highlightQty').value = hlQty.toFixed(2);
}
const div = document.createElement('div');
div.className = `trade ${maker?'sell':'buy'}${qty>=hlQty?' highlight':''}`;
div.innerHTML = `<span>${new Date(ts).toLocaleTimeString()}</span><span>${price}</span><span>${qty}</span><span>${formatUSDT(val)}</span>`;
tapeEl.prepend(div);
if (tapeEl.children.length > 60) tapeEl.removeChild(tapeEl.lastChild);
if (maker) {
sellVolume += qty;
delta -= qty;
} else {
buyVolume += qty;
delta += qty;
}
priceHistory.push(price);
if (priceHistory.length > 60) priceHistory.shift();
const vDiffPct = vwap > 0 ? ((price - vwap) / vwap) * 100 : 0;
const pc = vDiffPct > 0 ? 'indicator-positive' : vDiffPct < 0 ? 'indicator-negative' : 'indicator-neutral';
currentPriceEl.className = '';
currentPriceEl.classList.add(pc);
currentPriceEl.textContent = `Цена: ${price}`;
if (!currentCandle && rawTrades.length > 0) {
const cs = getCandleStart(rawTrades[0].timestamp, chartTimeframe);
currentCandle = createCandle(chartTimeframe, cs, cumulativeDeltaStart);
}
if (currentCandle) {
const cs = getCandleStart(ts, chartTimeframe);
if (cs !== currentCandle.startTime) {
finalizeCandle(currentCandle);
cumulativeDeltaStart = currentCandle.close;
currentCandle = createCandle(chartTimeframe, cs, cumulativeDeltaStart);
}
updateCandle(currentCandle, tDelta, qty, !maker);
}
const now = Date.now();
if (now - lastReset >= 60000) {
const avgD = buyVolume - sellVolume;
deltaHistory.push(avgD);
if (deltaHistory.length > 30) deltaHistory.shift();
let lt = 0.000001, st = 0.000001;
if (deltaHistory.length >= 5) {
let p=[], n=[];
for (const d of deltaHistory) {
if (d>0){p.push(d);n.push(0);}
else if (d<0){p.push(0);n.push(Math.abs(d));}
else {p.push(0);n.push(0);}
}
const pm = p.reduce((a,b)=>a+b,0)/p.length||0;
const nm = n.reduce((a,b)=>a+b,0)/n.length||0;
lt = Math.max(0.1, pm);
st = Math.max(0.1, nm);
}
let curSig = 'neutral';
if (avgD > lt) curSig = 'long';
else if (avgD < -st) curSig = 'short';
confirmedSignals.push(curSig);
if (confirmedSignals.length > 3) confirmedSignals.shift();
const cl = confirmedSignals.filter(s=>s==='long').length;
const cs = confirmedSignals.filter(s=>s==='short').length;
let fin = 'neutral';
if (cl >= 2) fin = 'long';
else if (cs >= 2) fin = 'short';
signalStrength = 0;
if (fin === 'long' && lt > 0.1) signalStrength = Math.min(100, (avgD / lt) * 100);
else if (fin === 'short' && st > 0.1) signalStrength = Math.min(100, (Math.abs(avgD) / st) * 100);
signalStrength = Math.max(0, Math.min(100, signalStrength));
confirmedSignals.slice(-3).forEach((sg, i) => {
if (!confirmationDots[i]) return;
confirmationDots[i].className = 'confirm-dot' + (sg==='long'?' active-long':sg==='short'?' active-short':'');
});
if (fin !== lastSignal) {
if (fin === 'long') {
signalEl.textContent = '🟢 ЛОНГ';
signalEl.className = 'long';
} else if (fin === 'short') {
signalEl.textContent = '🔴 ШОРТ';
signalEl.className = 'short';
} else {
signalEl.textContent = '⚪ Нейтрально';
signalEl.className = 'neutral';
}
lastSignal = fin;
currentSignalType = fin;
saveSignalToChart(fin, signalStrength);
}
statsTextEl.innerHTML = `
📈 Buy: ${fmt(buyVolume)} | 📉 Sell: ${fmt(Math.abs(sellVolume))} | Δ: ${fmt(avgD)}<br>
Long: ${fmt(lt)} | Short: ${fmt(st)}
`;
const vDiffPct2 = vwap > 0 ? ((price - vwap) / vwap) * 100 : 0;
const vCl = vDiffPct2 > 0.3 ? 'indicator-positive' : vDiffPct2 < -0.3 ? 'indicator-negative' : 'indicator-neutral';
const mom = avgD - prevMinuteDelta;
const momCl = mom > 0 ? 'indicator-positive' : mom < 0 ? 'indicator-negative' : 'indicator-neutral';
const lbp = totalTrades > 0 ? (largeBuyTrades/totalTrades)*100 : 0;
const lsp = totalTrades > 0 ? (largeSellTrades/totalTrades)*100 : 0;
const tv = buyVolume + Math.abs(sellVolume);
const br = tv > 0 ? (buyVolume/tv)*100 : 50;
const sr = tv > 0 ? (Math.abs(sellVolume)/tv)*100 : 50;
const balanceClass = br > 50 ? 'indicator-positive' : sr > 50 ? 'indicator-negative' : 'indicator-neutral';
const strengthClass = currentSignalType === 'long' ? 'indicator-positive' : currentSignalType === 'short' ? 'indicator-negative' : 'indicator-neutral';
const largeClass = lbp > lsp ? 'indicator-positive' : lsp > lbp ? 'indicator-negative' : 'indicator-neutral';
indicatorsGrid.innerHTML = `
<div class="indicator-card">
<div class="indicator-header">
<span class="indicator-icon">📊</span>
<span class="indicator-title">VWAP</span>
</div>
<div class="indicator-value ${vCl}">${fmtV(vwap)}</div>
<div class="indicator-detail">${price.toFixed(2)}</div>
</div>
<div class="indicator-card">
<div class="indicator-header">
<span class="indicator-icon">⚡</span>
<span class="indicator-title">Импульс</span>
</div>
<div class="indicator-value ${momCl}">${mom>0?'+':''}${mom.toFixed(1)}</div>
<div class="indicator-detail">${base.toUpperCase()}/мин</div>
</div>
<div class="indicator-card">
<div class="indicator-header">
<span class="indicator-icon">🎯</span>
<span class="indicator-title">Сила</span>
</div>
<div class="indicator-value ${strengthClass}">${signalStrength|0}%</div>
<div class="indicator-detail">${currentSignalType === 'long' ? 'Лонг' : currentSignalType === 'short' ? 'Шорт' : 'Нейтр'}</div>
</div>
<div class="indicator-card">
<div class="indicator-header">
<span class="indicator-icon">💎</span>
<span class="indicator-title">Крупные</span>
</div>
<div class="indicator-value ${largeClass}">${lbp.toFixed(0)}% / ${lsp.toFixed(0)}%</div>
<div class="indicator-detail">${largeBuyTrades} / ${largeSellTrades}</div>
</div>
<div class="indicator-card">
<div class="indicator-header">
<span class="indicator-icon">⚖️</span>
<span class="indicator-title">Баланс</span>
</div>
<div class="indicator-value ${balanceClass}">${br.toFixed(0)}% / ${sr.toFixed(0)}%</div>
<div class="indicator-detail">${br > 50 ? 'Покупки' : sr > 50 ? 'Продажи' : 'Баланс'}</div>
</div>
`;
delta = 0;
prevMinuteDelta = avgD;
buyVolume = 0;
sellVolume = 0;
lastReset = now;
largeBuyTrades = 0;
largeSellTrades = 0;
totalTrades = 0;
}
if (document.getElementById('autoScroll').checked) {
tapeEl.scrollTo({ top: 0, behavior: 'smooth' });
}
// === УДАЛЕНО: Math.random() - теперь рендер каждый трейд ===
requestRender();
};
wsLeft.onerror = (err) => console.error('WS error:', err);
wsLeft.onclose = (e) => {
wsLeft = null;
if (isStreamActive && reconnectAttemptsLeft < MAX_RECONNECT) {
reconnectAttemptsLeft++;
const d = RECONNECT_DELAY * Math.min(2**(reconnectAttemptsLeft-1), 8);
updateStatus(`⚠️ Переподключение ${reconnectAttemptsLeft}/${MAX_RECONNECT}`, '#ffd700');
clearTimeout(reconnectTimeoutLeft);
reconnectTimeoutLeft = setTimeout(startStream, d);
} else if (isStreamActive) {
updateStatus('❌ Ошибка', '#f23645');
currentPriceEl.textContent = 'Цена: —';
}
};
}
function startRightStream() {
if (wsRight && wsRight.readyState !== WebSocket.CLOSED) {
wsRight.onclose = null;
wsRight.close();
wsRight = null;
}
const fullSymbol = symbolInput.value.toUpperCase().trim();
const market = marketTypeSelect.value;
tapeRightEl.innerHTML = '';
let vhR = [];
reconnectAttemptsRight = 0;
const url = market === 'spot' ?
`wss://stream.binance.com:9443/ws/${fullSymbol.toLowerCase()}@aggTrade` :
`wss://fstream.binance.com/ws/${fullSymbol.toLowerCase()}@aggTrade`;
wsRight = new WebSocket(url);
wsRight.onopen = () => console.log('WS right open');
wsRight.onmessage = (ev) => {
const data = JSON.parse(ev.data);
// === ПРОВЕРКА СИМВОЛА ===
if (data.s !== currentFullSymbol) {
return;
}
const price = parseFloat(data.p);
const qty = parseFloat(data.q);
const maker = data.m;
vhR.push(qty);
if (vhR.length > 60) vhR.shift();
// === АВТО/РУЧНОЙ РЕЖИМ ДЛЯ ДОП ФИЛЬТРА ===
const mnR = autoMinQtyRight ? (vhR.reduce((a,b)=>a+b,0)/vhR.length * 0.5) : (parseFloat(minQtyRightInput.value) || 10);
if (qty < mnR) return;
// Обновляем значение в поле только в авто-режиме
if (autoMinQtyRight) {
document.getElementById('minQtyRight').value = mnR.toFixed(2);
}
const div = document.createElement('div');
div.className = `trade ${maker?'sell':'buy'}`;
div.innerHTML = `<span>${new Date(data.T).toLocaleTimeString()}</span><span>${price}</span><span>${qty}</span><span>${formatUSDT(price*qty)}</span>`;
tapeRightEl.prepend(div);
if (tapeRightEl.children.length > 60) tapeRightEl.removeChild(tapeRightEl.lastChild);
if (document.getElementById('autoScroll').checked) {
tapeRightEl.scrollTo({ top: 0, behavior: 'smooth' });
}
};
wsRight.onerror = (err) => console.error('WS right error:', err);
wsRight.onclose = (e) => {
wsRight = null;
if (reconnectAttemptsRight < MAX_RECONNECT) {
reconnectAttemptsRight++;
const d = RECONNECT_DELAY * Math.min(2**(reconnectAttemptsRight-1), 8);
clearTimeout(reconnectTimeoutRight);
reconnectTimeoutRight = setTimeout(startRightStream, d);
}
};
}
function formatUSDT(v) {
return Math.floor(v).toLocaleString('ru-RU').replace(/,/g, ' ');
}
let fundingAbortController = null;
async function fetchFunding() {
// Отмена предыдущего запроса
if (fundingAbortController) {
fundingAbortController.abort();
}
fundingAbortController = new AbortController();
const fullSymbol = symbolInput.value.toUpperCase().trim();
const market = marketTypeSelect.value;
if (market !== 'futures') {
fundingRateEl.textContent = 'Фандинг: —';
return;
}
try {
const r = await fetch(`https://fapi.binance.com/fapi/v1/fundingRate?symbol=${fullSymbol}&limit=1`, {
signal: fundingAbortController.signal
});
const d = await r.json();
if (Array.isArray(d) && d[0]) {
const f = parseFloat(d[0].fundingRate);
const fp = (f*100).toFixed(4);
const dir = f > 0 ? '🟢 Лонг' : f < 0 ? '🔴 Шорт' : '⚪ Нейтрально';
fundingRateEl.textContent = `Фандинг: ${fp}% (${dir})`;
} else {
fundingRateEl.textContent = 'Фандинг: —';
}
} catch (e) {
if (e.name !== 'AbortError') {
fundingRateEl.textContent = 'Фандинг: ошибка';
}
}
}
fetchFunding();
setInterval(fetchFunding, 12000);
</script>
</body>
</html>
